<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Itens - ALMOX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; color: #1e293b; }

        /* SIDEBAR */
        .menu-toggle {
            position: fixed; top: 15px; left: 15px; z-index: 1000; border: none;
            background: #2563eb; color: white; width: 45px; height: 45px; border-radius: 8px; cursor: pointer;
        }
        .sidebar {
            width: 250px; height: 100vh; background: #0f172a; color: white; padding: 20px;
            position: fixed; left: -250px; top: 0; transition: 0.4s; z-index: 999;
        }
        .sidebar.active { left: 0; }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo h2 { color: #38bdf8; }
        .menu { list-style: none; }
        .menu a {
            color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;
            padding: 12px; border-radius: 8px; transition: 0.3s;
        }
        .menu a:hover { background: #1e293b; }

        /* CONTEÚDO PRINCIPAL */
        .main { width: 100%; padding: 20px; margin-top: 60px; }
        
        .header-cadastro {
            background: white; padding: 20px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        .cadastro-box {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* GALERIA DE FOTOS */
        .photos-container { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }

        .upload-btn-wrapper {
            width: 120px; height: 120px; border: 2px dashed #2563eb; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #f8fafc; color: #2563eb;
        }

        .photo-preview { position: relative; width: 120px; height: 120px; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
        
        .remove-photo-btn {
            position: absolute; top: -5px; right: -5px; background: #ef4444; color: white;
            border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* FORMULÁRIO */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-weight: bold; font-size: 14px; color: #64748b; }
        .input-group input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .btn-primary { 
            background: #2563eb; color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()"><i class="fa fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="logo"><h2>ALMOX</h2></div>
        <ul class="menu">
            <li><a href="dashboard.html"><i class="fa fa-house"></i> Dashboard</a></li>
            <li><a href="produtos.html"><i class="fa fa-box"></i> Produtos</a></li>
            <li><a href="estoque.html"><i class="fa fa-warehouse"></i> Estoque</a></li>
            <li><a href="configuracoes.html"><i class="fa fa-gear"></i> Configurações</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="header-cadastro">
            <h1><i class="fa fa-images"></i> Cadastro de Produto</h1>
        </div>

        <div class="cadastro-box">
            <label style="font-weight: bold; color: #64748b; display: block; margin-bottom: 10px;">Galeria do Produto</label>
            
            <div class="photos-container" id="galeria">
                <div class="upload-btn-wrapper" onclick="document.getElementById('multipleInp').click()">
                    <i class="fa fa-plus-circle fa-2x"></i>
                    <span style="font-size: 12px; margin-top: 5px;">Add Foto</span>
                    <input type="file" id="multipleInp" hidden accept="image/*" multiple onchange="adicionarFotos(this)">
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Nome do Produto</label>
                    <input type="text" placeholder="Ex: Cadeira de Escritório">
                </div>
                <div class="input-group">
                    <label>Código SKU</label>
                    <input type="text" placeholder="REF-001">
                </div>
                <div class="input-group">
                    <label>Localização</label>
                    <input type="text" placeholder="Prateleira B4">
                </div>
            </div>

            <button class="btn-primary" onclick="alert('Salvo com sucesso!')">
                <i class="fa fa-save"></i> Salvar Produto
            </button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }

        function adicionarFotos(input) {
            const galeria = document.getElementById('galeria');
            const arquivos = input.files;

            for (let i = 0; i < arquivos.length; i++) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'photo-preview';
                    div.innerHTML = `
                        <img src="${e.target.result}">
                        <button type="button" class="remove-photo-btn" onclick="this.parentElement.remove()">
                            <i class="fa fa-times"></i>
                        </button>
                    `;
                    galeria.appendChild(div);
                }
                leitor.readAsDataURL(arquivos[i]);
            }
            input.value = "";
        }
    </script>
</body>
</html>
